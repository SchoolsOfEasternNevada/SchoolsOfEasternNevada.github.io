<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>G.GUI | TERMINAL</title>
    <link rel="icon" type="image/png" href="https://du11hjcvx0uqb.cloudfront.net/dist/images/favicon-e10d657a73.ico">
    <style>
        :root {
            --g-accent: #00f2ff;
            --g-bg: #050505;
            --g-panel: #111111;
            --g-text: #ffffff;
            --g-glass: rgba(255, 255, 255, 0.05);
            --g-border: rgba(0, 242, 255, 0.2);
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            background-color: var(--g-bg);
            color: var(--g-text);
            overflow-x: hidden;
            background-image: radial-gradient(circle at 50% 50%, #001a1d 0%, #050505 100%);
            min-height: 100vh;
        }

        header {
            height: 70px;
            background: var(--g-glass);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--g-border);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
        }

        .header-content {
            width: 100%;
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 2px;
            color: var(--g-accent);
            text-transform: uppercase;
            text-shadow: 0 0 10px rgba(0, 242, 255, 0.5);
        }

        .search-container {
            display: flex;
            gap: 10px;
            background: rgba(0,0,0,0.5);
            padding: 5px;
            border-radius: 8px;
            border: 1px solid var(--g-border);
        }

        #searchBar {
            background: transparent;
            border: none;
            color: white;
            padding: 8px 15px;
            outline: none;
            width: 200px;
        }

        #sortOptions {
            background: var(--g-panel);
            color: var(--g-accent);
            border: 1px solid var(--g-border);
            border-radius: 4px;
            padding: 5px;
            cursor: pointer;
        }

        #gameDatabaseSelect {
            background: var(--g-panel);
            color: var(--g-accent);
            border: 1px solid var(--g-border);
            border-radius: 4px;
            padding: 5px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        #gameDatabaseSelect option {
            background: #1a1a1a;
            color: #00f2ff;
        }

        .nav-controls {
            display: flex;
            gap: 10px;
        }

        .g-btn {
            background: transparent;
            color: var(--g-accent);
            border: 1px solid var(--g-accent);
            padding: 8px 15px;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            text-transform: uppercase;
            text-decoration: none;
            font-size: 0.8rem;
            transition: 0.3s;
            display: inline-flex;
            align-items: center;
        }

        .g-btn:hover {
            background: var(--g-accent);
            color: black;
            box-shadow: 0 0 15px var(--g-accent);
        }

        main {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 2rem;
        }

        summary {
            list-style: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            color: #666;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .zone-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 50px;
        }

        .zone-item {
            background: var(--g-panel);
            border: 1px solid rgba(255,255,255,0.05);
            border-radius: 4px;
            position: relative;
            overflow: hidden;
            transition: 0.3s;
            aspect-ratio: 1 / 1;
            display: flex;
            flex-direction: column;
            cursor: pointer;
        }

        .zone-item:hover {
            border-color: var(--g-accent);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.2);
            transform: scale(1.02);
        }

        .zone-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        .zone-item button {
            width: 100%;
            background: linear-gradient(to top, rgba(0,0,0,0.9) 0%, transparent 100%);
            border: none;
            color: white;
            padding: 15px 10px;
            font-weight: 600;
            text-align: center;
            position: absolute;
            bottom: 0;
            z-index: 2;
            cursor: pointer;
            text-transform: uppercase;
            font-size: 0.8rem;
        }

        #zoneViewer {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 2000;
        }

        .zone-header {
            height: 60px;
            background: #111;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--g-accent);
        }

        .zone-controls button {
            background: #222;
            color: white;
            border: 1px solid #444;
            padding: 5px 15px;
            margin-left: 5px;
            cursor: pointer;
        }

        #zoneFrame { width: 100%; height: calc(100vh - 60px); border: none; }

        #popupOverlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            backdrop-filter: blur(8px);
            z-index: 3000;
            align-items: center;
            justify-content: center;
        }

        .popup {
            background: var(--g-panel);
            border: 1px solid var(--g-accent);
            width: 90%;
            max-width: 500px;
            padding: 25px;
            border-radius: 0;
        }

        footer { padding: 40px 0; text-align: center; font-size: 0.7rem; opacity: 0.4; letter-spacing: 2px; }
        footer a { color: white; text-decoration: none; margin: 0 10px; }
    </style>
</head>

<body class="dark-mode">
    <header>
        <div class="header-content">
            <div class="logo">G.GUI // GAMES TERMINAL</div>
            <div class="search-container">
                <input type="text" id="searchBar" placeholder="SEARCH DATABASE..." oninput="filterZones()">
                <select id="sortOptions" onchange="sortZones()">
                    <option value="name">NAME</option>
                    <option value="id">RECENT</option>
                    <option value="popular">POPULAR</option>
                </select>
                <select id="gameDatabaseSelect" onchange="switchGameDatabase()">
                    <option value="gn-math" selected>GN-MATH</option>
                    <option value="petezah">PETEZAH</option>
                    <option value="elite">ELITE GAMEZ</option>
                    <option value="sea-bean">SEA BEAN</option>
                    <option value="blox">BLOXCRAFT UBG</option>
                    <option value="seraph">SERAPH</option>
                    <option value="ugs">UGS</option>
                </select>
            </div>
            <div class="nav-controls">
                <a href="../index.html" class="g-btn">HOME</a>
                <button id="settings" class="g-btn">SETTINGS</button>
            </div>
        </div>
    </header>

    <main>
        <details id="featuredZonesWrapper" open>
            <summary id="allZonesSummary">FEATURED_SEQUENCES</summary>
            <div id="featuredZones" class="zone-container"></div>
        </details>

        <hr style="border: none; border-top: 1px solid rgba(0,242,255,0.1); margin: 30px 0;">

        <details id="allZonesWrapper" open>
            <summary id="allSummary">DATABASE_LOADED (0)</summary>
            <div id="container" class="zone-container">CONNECTING TO HOST...</div>
        </details>
    </main>

    <div id="zoneViewer">
        <div class="zone-header">
            <div>
                <span id="zoneName" style="font-weight:bold; color:var(--g-accent); text-transform: uppercase;">DATA_STREAM</span>
                <span id="zoneId" style="display:none"></span>
                <a id="zoneAuthor" href="#" target="_blank" style="font-size:10px; margin-left:15px; color:#555; text-decoration:none">UNIDENTIFIED</a>
            </div>
            <div class="zone-controls">
                <button onclick="fullscreenZone()">FULLSCREEN</button>
                <button onclick="aboutBlank()">CLOAK_TAB</button>
                <button onclick="downloadZone()">EXPORT</button>
                <button onclick="closeZone()" style="color: #ff4a4a; border-color: #ff4a4a;">DISCONNECT</button>
            </div>
        </div>
        <iframe id="zoneFrame"></iframe>
    </div>

    <div id="popupOverlay">
        <div class="popup">
            <div style="display:flex; justify-content:space-between; margin-bottom:20px; border-bottom: 1px solid var(--g-accent); padding-bottom:10px;">
                <h3 id="popupTitle" style="margin:0; color:var(--g-accent); font-size:0.9rem;">SYSTEM_MESSAGE</h3>
                <button onclick="closePopup()" style="background:none; border:none; color:white; cursor:pointer;">[X]</button>
            </div>
            <div id="popupBody"></div>
        </div>
    </div>

    <footer>
        <div class="footer-links">
            <a href="#" onclick="showContact(); return false;">CONTACT</a>
            <a href="#" onclick="loadPrivacy(); return false;">PRIVACY</a>
            <a href="#" onclick="reloadCurrentDatabase(); return false;">REFRESH_DB</a>
            <a href="javascript:saveData()">SAVE_DATA</a>
            <a href="#" onclick="document.getElementById('importData').click(); return false;">LOAD_DATA</a>
            <input type="file" id="importData" style="display: none;" onchange="loadData(event)">
        </div>
        <p style="margin-top:15px;">G.GUI GAMES TERMINAL 1.0</p>
    </footer>

    <script src="script.js"></script>
    <script>
        const providerConfigs = {
            petezah: { type: 'json', url: 'https://cdn.jsdelivr.net/gh/PeteZah-G/singlefile-json@main/search.json' },
            elite: { type: 'json', url: 'https://cdn.jsdelivr.net/gh/elite-gamez/elite-gamez.github.io@main/games.json' },
            'sea-bean': { type: 'json', url: 'https://cdn.jsdelivr.net/gh/sea-bean-unblocked/sde@main/zzz.json' },
            blox: { type: 'json', url: 'https://cdn.jsdelivr.net/gh/tharun9772/tharun9772.github.io/games/games.json' },
            seraph: { type: 'json', url: 'https://cdn.jsdelivr.net/gh/DominumNetwork/dominum@main/src/assets/libraries/seraph/games.json' },
            ugs: { type: 'repos', repos: ['tharun9772/ugs-1', 'tharun9772/ugs-2', 'tharun9772/ugs-3'] },
        };

        function providerFallbackCover(name) {
            return 'https://ui-avatars.com/api/?name=' + encodeURIComponent(name || 'Game') + '&background=050505&color=00f2ff&size=256';
        }

        function toAbsolute(base, maybeRelative) {
            if (!maybeRelative) return '';
            if (/^https?:\/\//i.test(maybeRelative)) return maybeRelative;
            return base.replace(/\/$/, '') + '/' + maybeRelative.replace(/^\//, '');
        }

        async function loadProviderGames(providerKey) {
            if (providerKey === 'gn-math') {
                await listZones();
                return;
            }

            const config = providerConfigs[providerKey];
            if (!config) {
                throw new Error('Unknown provider: ' + providerKey);
            }

            let mappedZones = [];

            if (config.type === 'repos') {
                let idCounter = 1;
                for (const repo of config.repos) {
                    const response = await fetch('https://api.github.com/repos/' + repo + '/contents/?t=' + Date.now());
                    if (!response.ok) {
                        throw new Error('HTTP ' + response.status + ' while loading ' + repo);
                    }
                    const files = await response.json();
                    files.forEach((file) => {
                        if (file.type === 'file' && file.name.startsWith('cl') && file.name.endsWith('.html')) {
                            const cleanName = file.name.replace(/^cl/, '').replace('.html', '');
                            mappedZones.push({
                                id: idCounter++,
                                name: cleanName.charAt(0).toUpperCase() + cleanName.slice(1),
                                cover: 'https://cdn.jsdelivr.net/gh/tharun9772/game-assets@main/5968517.png',
                                url: 'https://cdn.jsdelivr.net/gh/' + repo + '@main/' + file.name,
                                author: 'UGS'
                            });
                        }
                    });
                }
            } else {
                const response = await fetch(config.url + '?t=' + Date.now());
                if (!response.ok) {
                    throw new Error('HTTP ' + response.status + ' while loading provider data');
                }
                const data = await response.json();

                if (providerKey === 'petezah') {
                    mappedZones = (data.games || []).map((game, index) => {
                        let gameUrl = game.url || '';
                        if (gameUrl && !gameUrl.endsWith('index.html') && !gameUrl.match(/\.\w+$/)) {
                            gameUrl = gameUrl.replace(/\/$/, '') + '/index.html';
                        }
                        return {
                            id: index + 1,
                            name: game.label || 'Unknown Game',
                            cover: game.imageUrl || providerFallbackCover(game.label),
                            url: gameUrl,
                            author: 'PeteZah'
                        };
                    });
                } else if (providerKey === 'elite') {
                    mappedZones = (data || []).map((game, index) => ({
                        id: index + 1,
                        name: game.title || game.name || 'Unknown Game',
                        cover: game.image ? toAbsolute('https://cdn.jsdelivr.net/gh/elite-gamez/elite-gamez.github.io@main/', game.image) : providerFallbackCover(game.title || game.name),
                        url: toAbsolute('https://cdn.jsdelivr.net/gh/elite-gamez/elite-gamez.github.io@main/', game.url || ''),
                        author: 'Elite'
                    }));
                } else if (providerKey === 'sea-bean') {
                    mappedZones = (data || []).map((game, index) => {
                        let gameUrl = game.html || game.url || '';
                        if (gameUrl.includes('{HTML_URL}')) {
                            gameUrl = gameUrl.replace('{HTML_URL}', 'https://cdn.jsdelivr.net/gh/sea-bean-unblocked/Singlemile@main/games/');
                        } else {
                            gameUrl = toAbsolute('https://cdn.jsdelivr.net/gh/sea-bean-unblocked/Singlemile@main/games/', gameUrl);
                        }
                        const cover = (game.cover || game.img || '').replace('{COVER_URL}/', '');
                        return {
                            id: index + 1,
                            name: game.name || game.id || 'Unknown Game',
                            cover: cover ? toAbsolute('https://cdn.jsdelivr.net/gh/sea-bean-unblocked/Singlemile@main/Icon/', cover) : providerFallbackCover(game.name || game.id),
                            url: gameUrl,
                            author: 'Sea Bean'
                        };
                    });
                } else if (providerKey === 'blox') {
                    mappedZones = (data || []).map((game, index) => {
                        let cleanedUrl = (game.url || '').replace('/app-viewer/?view=/', '/');
                        if (cleanedUrl && !cleanedUrl.endsWith('index.html')) {
                            cleanedUrl = cleanedUrl.replace(/\/?$/, '/') + 'index.html';
                        }
                        return {
                            id: index + 1,
                            name: game.name || 'Unknown Game',
                            cover: game.img || providerFallbackCover(game.name),
                            url: toAbsolute('https://cdn.jsdelivr.net/gh/tharun9772/tharun9772.github.io@main/', cleanedUrl),
                            author: 'Blox'
                        };
                    });
                } else if (providerKey === 'seraph') {
                    mappedZones = (data || []).map((game, index) => {
                        const gamePath = (game.url || '').endsWith('index.html') ? game.url : (game.url || '').replace(/\/?$/, '/index.html');
                        return {
                            id: index + 1,
                            name: game.name || 'Unknown Game',
                            cover: game.img || providerFallbackCover(game.name),
                            url: toAbsolute('https://cdn.jsdelivr.net/gh/a456pur/seraph@main/', gamePath),
                            author: 'Seraph'
                        };
                    });
                }
            }

            zones = mappedZones.filter((zone) => zone && zone.name && zone.url);
            featuredContainer.innerHTML = '';
            sortZones();
        }

        async function switchGameDatabase() {
            const selector = document.getElementById('gameDatabaseSelect');
            if (!selector) return;

            const provider = selector.value;
            localStorage.setItem('ggui_selected_provider', provider);

            try {
                await loadProviderGames(provider);
            } catch (error) {
                alert('Failed to load selected database: ' + (error.message || error));
            }
        }

        function reloadCurrentDatabase() {
            switchGameDatabase();
        }

        (function applySeasonModeFromSettings() {
            try {
                const raw = localStorage.getItem('ggui_settings');
                if (!raw) return;
                const settings = JSON.parse(raw);
            } catch (_) {
                /* Ignore malformed settings and keep default theme. */
            }
        })();

        (function restoreSelectedDatabase() {
            const selector = document.getElementById('gameDatabaseSelect');
            if (!selector) return;

            const savedProvider = localStorage.getItem('ggui_selected_provider');
            if (!savedProvider) return;

            const option = Array.from(selector.options).find((opt) => opt.value === savedProvider);
            if (option) {
                selector.value = savedProvider;
                switchGameDatabase();
            }
        })();

    </script>
</body>
</html>
